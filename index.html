<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meadow Defense</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <header id="hud">
      <div class="stat">
        <span class="stat-label">Gold</span>
        <span class="stat-value gold" id="gold-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Lives</span>
        <span class="stat-value lives" id="lives-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Wave</span>
        <span class="stat-value wave" id="wave-value">0</span>
      </div>
      <div class="stat stat-income">
        <span class="stat-label">Income / Wave</span>
        <span class="stat-value income" id="income-value">+0</span>
        <span class="stat-sub" id="income-detail">Invest in Sunpatches</span>
      </div>
      <div class="stat stat-shards">
        <span class="stat-label">Bloom Shards</span>
        <span class="stat-value shards" id="shards-value">0</span>
        <span class="stat-sub" id="prestige-count">Prestige 0</span>
      </div>
      <div class="hud-controls">
        <label class="toggle-label" title="Automatically start the next wave after a short delay">
          <input type="checkbox" id="auto-start-toggle">
          Auto-start waves
        </label>
        <button id="start-wave-btn" class="primary-btn">Start Wave 1</button>
      </div>
    </header>

    <main id="game-area">
      <canvas id="game-canvas"></canvas>

      <aside id="sidebar">
        <section id="build-section">
          <h2>Build</h2>
          <div id="build-panel"></div>
        </section>

        <section id="upgrade-panel" class="hidden">
          <h2 id="upgrade-title">Upgrade</h2>
          <div id="upgrade-stats"></div>
          <div id="upgrade-buttons"></div>
        </section>

        <section id="wave-summary" class="hidden"></section>

        <section id="prestige-section">
          <h2>Prestige</h2>
          <p class="prestige-hint" id="prestige-hint">Reach Wave 50 to unlock Prestige</p>
          <button id="prestige-btn" class="prestige-btn hidden" disabled>Prestige Run</button>
          <div id="prestige-upgrades"></div>
        </section>
      </aside>
    </main>

    <footer id="instructions">
      <p>Balance Sunpatch investments with tower upgrades. Boss waves arrive every 15 rounds. Prestige at Wave 50 for Bloom Shards.</p>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
